<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Weather</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e1a; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #intensity-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 220px;
      background: rgba(10, 14, 30, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(140, 180, 255, 0.15);
      border-radius: 8px;
      padding: 10px 12px;
      cursor: default;
    }

    #intensity-toggle .control {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6px 10px;
      color: rgba(200, 215, 240, 0.85);
      font: 12px/1.2 'SF Mono', 'Menlo', 'Consolas', monospace;
      letter-spacing: 0.02em;
    }

    #intensity-toggle .control-title {
      text-transform: uppercase;
      color: rgba(170, 190, 220, 0.7);
    }

    #intensity-toggle .control-value {
      color: rgba(210, 225, 255, 0.95);
    }

    #intensity-toggle input[type="range"] {
      grid-column: 1 / -1;
      width: 100%;
      accent-color: rgb(120, 170, 255);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="intensity-toggle"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
